---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app2
  namespace: devops
  labels:
    app: devops-app2
    version: v1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: devops-app2
  template:
    metadata:
      labels:
        app: devops-app2
        version: v1.0.0
    spec:
      containers:
      - name: devops-app2
        image: nginx:alpine
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
