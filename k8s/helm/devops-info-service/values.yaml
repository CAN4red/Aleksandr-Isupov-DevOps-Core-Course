# Default values for devops-info-service
# This is a YAML-formatted file.

# Replica count
replicaCount: 3

# Image configuration
image:
  repository: a.a.isupov/devops-info-service
  pullPolicy: IfNotPresent
  tag: "latest"

# Service account
serviceAccount:
  create: true
  name: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

# Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: devops.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource limits and requests
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables
env:
  - name: PORT
    value: "5000"
  - name: HOST
    value: "0.0.0.0"
  - name: DEBUG
    value: "False"

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Hooks configuration
hooks:
  preInstall:
    enabled: true
    image: busybox:latest
  postInstall:
    enabled: true
    image: busybox:latest

# Secrets configuration
secrets:
  enabled: true
  # Use stringData for plain text (auto-encoded by Kubernetes)
  # Use 'data' for pre-encoded base64 values
  data:
    username: "devops-user"
    password: "secure-password-123"
    api-key: "api-key-xyz-789"

# Vault configuration for external secrets
vault:
  enabled: false
  address: "http://vault:8200"
  role: "devops-info-service"
  secretsPath: "secret/data/devops-info-service"
  agent:
    enabled: true
    inject: true
    # Path where secrets will be mounted
    secretsPath: "/vault/secrets"
    # Template for rendering secrets
    template: |
      {{- with secret "secret/data/devops-info-service" -}}
      APP_USERNAME={{ .Data.data.username }}
      APP_PASSWORD={{ .Data.data.password }}
      API_KEY={{ .Data.data.api_key }}
      {{- end }}

# ConfigMap configuration
configMap:
  file:
    enabled: true
  env:
    enabled: true
    appEnv: "development"
    logLevel: "INFO"
    appName: "devops-info-service"
    featureMetrics: "true"

# Persistence configuration
persistence:
  enabled: true
  size: 100Mi
  accessMode: ReadWriteOnce
  storageClass: ""  # Use default storage class
  mountPath: /data

# Argo Rollouts configuration
rollout:
  enabled: false  # Enable canary rollout
  blueGreenEnabled: false  # Enable blue-green rollout (mutually exclusive with canary)
  # Canary steps configuration
  canarySteps:
    - setWeight: 20
      pause: {}
    - setWeight: 40
      pause:
        duration: 30s
    - setWeight: 60
      pause:
        duration: 30s
    - setWeight: 80
      pause:
        duration: 30s
    - setWeight: 100

# StatefulSet configuration
statefulset:
  enabled: false  # Set to true to use StatefulSet instead of Deployment
  # Update strategy configuration
  updateStrategy:
    type: RollingUpdate
    # rollingUpdate:
    #   partition: 2  # For partitioned rolling updates
  # Pod management policy (OrderedReady or Parallel)
  podManagementPolicy: OrderedReady

# Init Containers configuration
initContainers:
  # Download init container - downloads a file before main container starts
  download:
    enabled: false
    url: "https://example.com"
  # Wait-for-service init container - waits for a service to be available
  waitForService:
    enabled: false
    serviceName: "kubernetes.default"
