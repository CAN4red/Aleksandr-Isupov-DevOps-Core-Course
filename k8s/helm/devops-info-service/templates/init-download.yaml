{{- if .Values.initContainers.download.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "devops-info-service.fullname" . }}-init-download
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: init-demo
spec:
  initContainers:
    - name: init-download
      image: busybox:1.36
      command: ['sh', '-c', 'wget -O /work-dir/index.html {{ .Values.initContainers.download.url }} && echo "Download complete"']
      volumeMounts:
        - name: workdir
          mountPath: /work-dir
  containers:
    - name: main-app
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: workdir
          mountPath: /usr/share/nginx/html/downloaded
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 10
  volumes:
    - name: workdir
      emptyDir: {}
  restartPolicy: Never
{{- end }}
