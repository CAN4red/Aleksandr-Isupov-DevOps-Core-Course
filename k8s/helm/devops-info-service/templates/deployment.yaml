{{- if not .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-info-service.fullname" . }}
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "devops-info-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-info-service.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "devops-info-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if or .Values.initContainers.download.enabled .Values.initContainers.waitForService.enabled }}
      initContainers:
        {{- if .Values.initContainers.download.enabled }}
        - name: init-download
          image: busybox:1.36
          command: ['sh', '-c', 'wget -O /work-dir/config.json {{ .Values.initContainers.download.url }} && echo "Download complete"']
          volumeMounts:
            - name: workdir
              mountPath: /work-dir
        {{- end }}
        {{- if .Values.initContainers.waitForService.enabled }}
        - name: wait-for-service
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - |
              echo "Waiting for service {{ .Values.initContainers.waitForService.serviceName }}..."
              until nslookup {{ .Values.initContainers.waitForService.serviceName }}; do
                echo "Service not ready yet, sleeping..."
                sleep 2
              done
              echo "Service is available!"
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- if .Values.secrets.enabled }}
            # Inject secrets as environment variables
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-service.fullname" . }}-secret
                  key: username
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-service.fullname" . }}-secret
                  key: password
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-service.fullname" . }}-secret
                  key: api-key
            {{- end }}
            {{- if .Values.configMap.env.enabled }}
            # Inject ConfigMap as environment variables
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-info-service.fullname" . }}-env-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-info-service.fullname" . }}-env-config
                  key: LOG_LEVEL
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-info-service.fullname" . }}-env-config
                  key: APP_NAME
            - name: FEATURE_METRICS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-info-service.fullname" . }}-env-config
                  key: FEATURE_METRICS
            {{- end }}
          envFrom:
            {{- if .Values.configMap.env.enabled }}
            - configMapRef:
                name: {{ include "devops-info-service.fullname" . }}-env-config
            {{- end }}
          volumeMounts:
            {{- if .Values.configMap.file.enabled }}
            - name: config-volume
              mountPath: /config
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.configMap.file.enabled }}
        - name: config-volume
          configMap:
            name: {{ include "devops-info-service.fullname" . }}-file-config
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "devops-info-service.fullname" . }}-data
        {{- end }}
        {{- if or .Values.initContainers.download.enabled .Values.initContainers.waitForService.enabled }}
        - name: workdir
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
