{{- if .Values.hooks.postInstall.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-info-service.fullname" . }}-post-install"
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{ include "devops-info-service.fullname" . }}-post-install"
      labels:
        {{- include "devops-info-service.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: post-install-job
        image: {{ .Values.hooks.postInstall.image }}
        command: ['sh', '-c', 'echo "=== Post-install Hook Starting ===" && echo "Running smoke tests..." && sleep 5 && echo "Smoke tests passed!" && echo "Application is ready to serve traffic!" && echo "=== Post-install Hook Completed ==="']
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
{{- end }}
