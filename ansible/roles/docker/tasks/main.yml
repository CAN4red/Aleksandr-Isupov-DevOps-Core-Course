---
- name: Install Docker engine
  block:
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - python3-docker
        state: present

  rescue:
    - name: Wait before retrying Docker GPG key addition
      wait_for:
        timeout: 10

    - name: Retry adding Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry adding Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Retry updating apt cache
      apt:
        update_cache: yes

    - name: Retry installing Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - python3-docker
        state: present

  tags:
    - docker_install
    - docker

- name: Configure Docker service
  block:
    - name: Ensure Docker service is running and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

  always:
    - name: Ensure Docker service is enabled
      systemd:
        name: docker
        enabled: yes

  tags:
    - docker_config
    - docker
