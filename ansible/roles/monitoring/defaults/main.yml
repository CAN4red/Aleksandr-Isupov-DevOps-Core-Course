---
# Monitoring role defaults

# Service versions
monitoring_loki_version: "3.0.0"
monitoring_promtail_version: "3.0.0"
monitoring_grafana_version: "12.3.1"

# Service ports
monitoring_loki_port: 3100
monitoring_grafana_port: 3000
monitoring_promtail_port: 9080

# Log retention
monitoring_retention_period: "168h"  # 7 days

# Resource limits
monitoring_loki_memory_limit: "512M"
monitoring_loki_memory_reservation: "256M"
monitoring_loki_cpu_limit: "0.5"
monitoring_loki_cpu_reservation: "0.25"

monitoring_promtail_memory_limit: "256M"
monitoring_promtail_memory_reservation: "128M"
monitoring_promtail_cpu_limit: "0.5"
monitoring_promtail_cpu_reservation: "0.25"

monitoring_grafana_memory_limit: "1G"
monitoring_grafana_memory_reservation: "512M"
monitoring_grafana_cpu_limit: "1.0"
monitoring_grafana_cpu_reservation: "0.5"

monitoring_app_memory_limit: "256M"
monitoring_app_memory_reservation: "128M"
monitoring_app_cpu_limit: "0.5"
monitoring_app_cpu_reservation: "0.25"

# Schema version
monitoring_schema_version: "v13"

# Directory paths
monitoring_base_dir: "/opt/monitoring"
