---
- name: Create monitoring directory structure
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - ""
    - "loki"
    - "promtail"
    - "docs"

- name: Template Loki configuration file
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ monitoring_base_dir }}/loki/config.yml"
    mode: '0644'

- name: Template Promtail configuration file
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ monitoring_base_dir }}/promtail/config.yml"
    mode: '0644'

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/docker-compose.yml"
    mode: '0644'
